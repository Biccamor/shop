experiment:
  name: "exp_00"
  description: "Agent pipeliene test "

model:
  name: "gemma4:26b"
  options:
    temperature: 1.0
    top_p: 0.95
    top_k: 64
    num_predict: 2000
    num_ctx: 32000
    repeat_penalty: 1.2
  seed_base: 42

personas:
  TAYLOR_BASE:
    name: "Taylor Dover"
    experience: "a white male"
    need: "Wants to have meals for the day"


data:
  products_file: "data/exp_00/products.json"
  meals: ["breakfast", "lunch", "dinner"]
  rounds: 1
  days: 3

output:
  raw_dir: "results/exp_00/raw"
  metrics_dir: "results/exp_00/metrics"
  plots_dir: "plots/exp_00"